<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="cesium/Widgets/widgets.css">
    <script src="cesium/Cesium.js"></script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <title>3D Tiles Viewer</title>
    <script type="module" crossorigin src="./assets/viewer-D7K3UD4j.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/viewer-DF7u_3gx.css">
  </head>
  <body>
    <div id="cesiumContainer"></div>

    <!-- ── Top header ──────────────────────────────────────── -->
    <header id="appHeader">
      <div id="appLogo">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" aria-hidden="true">
          <path d="M11 2L20 7V15L11 20L2 15V7L11 2Z" stroke="#0696D7" stroke-width="1.6" stroke-linejoin="round"/>
          <path d="M11 20V11M2 7L11 11L20 7" stroke="#0696D7" stroke-width="1.1" stroke-opacity="0.45" stroke-linejoin="round"/>
        </svg>
        <span data-i18n="header.title">3D Tiles Viewer</span>
      </div>
      <div id="headerSearch">
        <input type="text" id="searchInput" data-i18n-placeholder="search.placeholder" placeholder="Search points…" autocomplete="off" />
        <div id="searchDropdown" style="display:none"></div>
      </div>
      <div id="headerActions">
        <button id="viewerLoadSessionBtn" class="header-btn">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true"><path d="M1 9.5V11.5H12V9.5M6.5 8V0.5M3.5 3.5L6.5 0.5L9.5 3.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span data-i18n="header.load">Load</span>
        </button>
        <input type="file" id="viewerSessionInput" accept=".json" style="display:none" />
        <div class="header-divider"></div>
        <button id="languageToggle" class="header-btn header-icon-btn" data-i18n-title="header.lang.title" data-i18n-aria-label="header.lang.aria" title="Switch language" aria-label="Switch language">
          <span id="languageToggleLabel">あ</span>
        </button>
        <button id="themeToggle" class="header-btn header-icon-btn" data-i18n-title="header.theme.title" data-i18n-aria-label="header.theme.aria" title="Toggle light/dark theme" aria-label="Toggle theme">
          <svg class="theme-icon theme-icon-dark" width="15" height="15" viewBox="0 0 15 15" fill="none" aria-hidden="true"><path d="M7.5 1.5a6 6 0 1 0 0 12 5 5 0 0 1 0-10 6 6 0 0 0 0-2z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
          <svg class="theme-icon theme-icon-light" width="15" height="15" viewBox="0 0 15 15" fill="none" aria-hidden="true"><circle cx="7.5" cy="7.5" r="3" stroke="currentColor" stroke-width="1.4"/><path d="M7.5 1v1.5M7.5 12.5V14M1 7.5h1.5M12.5 7.5H14M3.1 3.1l1.1 1.1M10.8 10.8l1.1 1.1M10.8 3.1l-1.1 1.1M4.2 10.8l-1.1 1.1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        </button>
      </div>
    </header>

    <div id="viewerSessionBanner" hidden></div>

    <!-- ── Left panel ──────────────────────────────────────── -->
    <aside id="leftPanel">

      <div id="viewerVenueBar">
        <label class="field-label" for="viewerVenueSelect" data-i18n="viewer.venue">Venue</label>
        <select id="viewerVenueSelect"></select>
      </div>

      <!-- Buildings -->
      <div class="panel-section" id="viewerBuildingsSection">
        <div class="panel-section-header">
          <span data-i18n="viewer.buildings">Buildings</span>
        </div>
        <div class="section-body">
          <div class="viewer-building-row">
            <select id="viewerBuildingSelect"></select>
            <button id="viewerBuildingZoomBtn" class="icon-btn zoom-btn" type="button"
                    data-i18n-title="viewer.zoomBuilding" title="Zoom to building">⊕</button>
          </div>
          <p id="viewerNoBuildings" class="empty-msg" data-i18n="viewer.noBuildings">No buildings loaded.</p>
        </div>
      </div>

      <!-- Layers -->
      <div class="panel-section panel-section-scene" id="viewerLayersSection">
        <div class="panel-section-header">
          <span data-i18n="viewer.layers">Layers</span>
        </div>
        <div class="section-body">
          <div id="layerTypeFilters"></div>
          <ul id="viewerLayersList"></ul>
          <p id="viewerNoLayers" class="empty-msg" data-i18n="viewer.noLayers">No layers.</p>
        </div>
      </div>

      <!-- Imported Layers (PLATEAU catalog) -->
      <div class="panel-section" id="importedLayersSection">
        <button class="panel-section-header collapsible" type="button">
          <span class="panel-section-chevron"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true"><polyline points="2,4 6,8 10,4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
          <span data-i18n="section.importedLayers">Imported Layers</span>
        </button>
        <div class="section-body">
          <ul id="importedLayersList"></ul>
          <p id="noImportedLayersMsg" class="empty-msg" data-i18n="import.empty">No imported layers.</p>
        </div>
      </div>

      <!-- Environment (imagery + terrain) -->
      <div class="panel-section" id="environmentSection">
        <button class="panel-section-header collapsible" type="button">
          <span class="panel-section-chevron"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true"><polyline points="2,4 6,8 10,4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
          <span data-i18n="section.environment">Environment</span>
        </button>
        <div class="section-body">
          <label class="field-label" for="imagerySelect" data-i18n="basemap.imageryLabel">Imagery</label>
          <select id="imagerySelect">
            <option value="osm" data-i18n="imagery.osm">OpenStreetMap</option>
            <option value="ion-bing-aerial" data-i18n="imagery.bingAerial">Bing Aerial (Ion)</option>
            <option value="ion-sentinel" data-i18n="imagery.sentinel">Sentinel-2 (Ion)</option>
            <option value="esri-street" data-i18n="imagery.esriStreet">Esri World Street Map</option>
            <option value="esri-topo" data-i18n="imagery.esriTopo">Esri World Topo Map</option>
            <option value="esri-imagery" data-i18n="imagery.esriImagery">Esri World Imagery</option>
            <option value="esri-light-gray" data-i18n="imagery.esriLightGray">Esri Light Gray Canvas</option>
            <option value="carto-positron" selected data-i18n="imagery.cartoPositron">CartoDB Positron</option>
          </select>
          <label class="field-label" for="terrainSelect" data-i18n="basemap.terrainLabel">Terrain</label>
          <select id="terrainSelect">
            <option value="ellipsoid" data-i18n="terrain.flat">Flat (no elevation)</option>
            <option value="cesium-world" data-i18n="terrain.cesiumWorld">Cesium World Terrain (Ion)</option>
            <option value="gsi-dem5a" data-i18n="terrain.gsi5a">Japan DEM 5A – GSI (free)</option>
            <option value="gsi-dem5b" data-i18n="terrain.gsi5b">Japan DEM 5B – GSI (free)</option>
            <option value="plateau" selected data-i18n="terrain.plateau">PLATEAU Terrain (Japan)</option>
          </select>
          <label class="toggle-label">
            <input type="checkbox" id="lodFilterToggle" />
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
            <span data-i18n="models.highestLodOnly">Highest LOD only</span>
          </label>
          <p id="lodFilterStatus" class="status-text"></p>
        </div>
      </div>

    </aside>

    <div id="leftPanelResizer" aria-hidden="true"></div>

    <button id="leftPanelToggle" class="panel-toggle panel-toggle-left" type="button" title="Toggle left panel" aria-label="Collapse left panel" data-i18n-title="panel.left.title" data-i18n-aria-label="panel.left.aria">
      <svg class="toggle-arrow" width="10" height="10" viewBox="0 0 10 10" fill="none" aria-hidden="true"><polyline points="7,1 3,5 7,9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>

    <div id="loadingOverlay" class="loading-overlay" hidden>
      <div class="loading-overlay-spinner" aria-hidden="true"></div>
      <p id="loadingOverlayMessage" class="loading-overlay-message"></p>
      <p id="loadingOverlaySubmessage" class="loading-overlay-submessage"></p>
    </div>

  </body>
</html>
